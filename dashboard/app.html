<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Dashboard</title>
    <meta name="description" content="Church Management SaaS Dashboard — Analytics, Members, Events, Prayers">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon"><i data-lucide="landmark" style="width:24px;height:24px;color:#a29bfe"></i></div>
        <div>
            <div class="brand-name" id="churchName">Church Dashboard</div>
            <div class="brand-role" id="userRole">Pastor</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a class="nav-item active" data-view="overview" onclick="switchView('overview')">
            <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span> Overview
        </a>
        <a class="nav-item" data-view="members" onclick="switchView('members')">
            <span class="nav-icon"><i data-lucide="users"></i></span> Members
        </a>
        <a class="nav-item" data-view="events" onclick="switchView('events')">
            <span class="nav-icon"><i data-lucide="calendar-days"></i></span> Events
        </a>
        <a class="nav-item" data-view="prayers" onclick="switchView('prayers')">
            <span class="nav-icon"><i data-lucide="hand-heart"></i></span> Prayer Wall
        </a>
        <a class="nav-item" data-view="feed" onclick="switchView('feed')">
            <span class="nav-icon"><i data-lucide="newspaper"></i></span> Feed
        </a>
        <a class="nav-item" data-view="shorts" onclick="switchView('shorts')">
            <span class="nav-icon"><i data-lucide="clapperboard"></i></span> Shorts
        </a>
        <a class="nav-item" data-view="giving" onclick="switchView('giving')">
            <span class="nav-icon"><i data-lucide="wallet"></i></span> Giving
        </a>

        <div class="nav-divider"></div>

        <a class="nav-item" data-view="notifications" onclick="switchView('notifications')">
            <span class="nav-icon"><i data-lucide="bell"></i></span> Notifications
            <span class="nav-badge" id="notifBadge" style="display:none">0</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-avatar" id="userAvatar">P</div>
        <div class="user-info">
            <div class="user-name" id="userName">Pastor</div>
            <div class="user-email" id="userEmail">pastor@church.org</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Sign Out"><i data-lucide="log-out" style="width:16px;height:16px"></i></button>
    </div>
</aside>

<!-- Main Content -->
<main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i data-lucide="menu" style="width:20px;height:20px"></i></button>
            <h1 class="page-title" id="pageTitle">Overview</h1>
        </div>
        <div class="topbar-right">
            <div class="topbar-search">
                <i data-lucide="search" class="search-icon" style="width:16px;height:16px;position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none"></i>
                <input type="text" placeholder="Search..." id="searchInput" style="padding-left:36px">
            </div>
            <button class="topbar-notif" onclick="switchView('notifications')">
                <i data-lucide="bell" style="width:20px;height:20px"></i>
                <span class="topbar-notif-dot" id="notifDot" style="display:none"></span>
            </button>
        </div>
    </header>

    <div class="content-area" id="contentArea">
        <!-- Views are rendered dynamically -->
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
